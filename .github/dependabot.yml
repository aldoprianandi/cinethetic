version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      react:
        patterns:
          - react
          - react-dom
      remotion:
        patterns:
          - remotion
          - "@remotion/*"
      fonts:
        patterns:
          - "@fontsource/*"
          - "@fontsource-variable/*"
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
